name: Release

on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.REPO }}:${{ steps.meta.outputs.VERSION }}
            ghcr.io/${{ steps.meta.outputs.REPO }}:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image
        run: cosign sign --yes ghcr.io/${{ steps.meta.outputs.REPO }}@${{ steps.build.outputs.digest }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set release image in Helm chart values
        run: |
          yq -i '.app.image = "ghcr.io/${{ steps.meta.outputs.REPO }}:${{ steps.meta.outputs.VERSION }}"' \
            target/helm/kubernetes/scone-osv-scanner-k8-operator/values.yaml

      - name: Package Helm chart
        run: |
          helm package target/helm/kubernetes/scone-osv-scanner-k8-operator/ \
            --version ${{ steps.meta.outputs.VERSION }} \
            --app-version ${{ steps.meta.outputs.VERSION }} \
            --destination .
          mv scone-osv-scanner-k8-operator-${{ steps.meta.outputs.VERSION }}.tgz scone-osv-scanner-k8-operator.tgz

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: scone-osv-scanner-k8-operator.tgz