name: osv-scanner-sample/scone-osv-scan
version: 0.3.10


access_policy:
  read:
    - ANY
  update:
    - CREATOR

services:
  - name: dbmanager
    command: /bin/osvdbmanager
    environment:
      OSV_CA_CERT_PATH: /etc/ssl/certs/GTS_Root_R1.pem
      OSV_HTTP_TIMEOUT: "10m"
      MYSQL_HOST: maxscale.default
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: osv
      MYSQL_ROOT_PASSWORD: $$SCONE::MYSQL_ROOT_PASSWORD:hex$$
      MYSQL_CA_PATH: /etc/mysql/ca/ca.crt
      SCONE_SYNC_FSPF_TAG_WITH_CAS: 0
      SCONE_FSPF_UPDATE_POLICY: "on-exit"
      LOG_LEVEL: INFO
      DB_UPDATE_INTERVAL: "24h"

    pwd: /
    image_name: dbmanager_image
    attestation:
      - mrenclave: [$MRENCLAVE_SOS_DB_MANAGER]

  - name: osvscan
    command: /bin/osvscan
    environment:
      MYSQL_HOST: maxscale.default
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: osv
      MYSQL_ROOT_PASSWORD: $$SCONE::MYSQL_ROOT_PASSWORD:hex$$
      MYSQL_CA_PATH: /etc/mysql/ca/ca.crt
      TLS_KEY_PATH: /etc/ssl/certs/tls.key
      TLS_CERT_PATH: /etc/ssl/certs/tls.crt
      LOG_LEVEL: INFO

    pwd: /
    image_name: osvscan_image
    attestation:
      - mrenclave: [$MRENCLAVE_SOS_OSV_SCAN]


secrets:
  - name: maxscale-frontend-cert
    import:
      session: osv-scanner-sample/mariadb-certificates
      secret: maxscale-frontend-cert
  - name: MYSQL_ROOT_PASSWORD
    import:
      session: osv-scanner-sample/mariadb-certificates
      secret: MYSQL_ROOT_PASSWORD
  - name: osvscan_key
    kind: private-key
    key_type: P-256
  - name: sos_ca_private_key
    kind: private-key
    key_type: P-256
  - name: sos_ca_certificate
    kind: x509-ca
    export_public: true
    private_key: sos_ca_private_key
    common_name: "sos-front-ca"
  - name: osvscan_certificate
    kind: x509
    export_public: true
    private_key: osvscan_key
    issuer: sos_ca_certificate
    common_name: sos-front.sos.svc.cluster.local
    endpoint: server
#    san:
#      - ip:{{LOAD_BALANCER_EXTERNAL_IP}} # This should be replaced with the actual IP address of the service
    valid_for: 365 days

volumes:
  - name: temp_volume

images:
  - name: dbmanager_image
    volumes:
      - name: temp_volume
        path: /tmp

