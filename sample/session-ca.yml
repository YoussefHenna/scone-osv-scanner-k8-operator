      labels:
        app: scone-session-ca
    spec:
      containers:
        - name: scone-session-ca
          image: ghcr.io/youssefhenna/scone-session-ca:latest
          ports:
            - containerPort: 8443
          env:
            - name: CA_CERT_FILE
              value: /test-certs/ca.crt
            - name: CA_PRIVATE_KEY_FILE
              value: /test-certs/ca.key
            - name: TLS_CERT_FILE
              value: /test-certs/tls.pem
            - name: TLS_PRIVATE_KEY_FILE
              value: /test-certs/tls.key
            - name: TRUSTED_CAS_CONFIG_FILE
              value: /test-certs/trusted-cas-config.json
            - name: CAS_ATTESTION_FLAGS
              value: "--only_for_testing-debug --only_for_testing-ignore-signer --only_for_testing-trust-any -GCS"
          volumeMounts:
            - name: certs
              mountPath: /test-certs
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: scone-session-ca-certs
---
apiVersion: v1
kind: Service
metadata:
  name: scone-session-ca
spec:
  selector:
    app: scone-session-ca
  ports:
    - port: 8443
      targetPort: 8443
      protocol: TCP